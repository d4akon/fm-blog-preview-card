<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="queries.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <article class="blog-card">
        <figure>
          <img
            src="./assets/images/illustration-article.svg"
            alt="Blog preview image"
            class="blog-img"
          />
        </figure>
        <div class="info-container">
          <span class="tag">Learning</span>
          <p class="published">
            Published <time datetime="2023-12-21"> 21 Dec 2023</time>
          </p>
          <a href="#" class="title">HTML & CSS foundations</a>
          <p class="description">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </div>
        <footer class="author-container">
          <img
            src="./assets/images/image-avatar.webp"
            alt="Face of blog author"
            class="author-img"
          />
          <span class="author">Greg Hooper</span>
        </footer>
      </article>
    </div>
    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="https://github.com/d4akon">Szymon Maj</a>.
    </div>
  </body>
</html>
